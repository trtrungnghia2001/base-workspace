<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Socket.io Room Pro - Test</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
      :root {
        --primary: #007bff;
        --success: #28a745;
        --danger: #dc3545;
        --gray: #6c757d;
      }
      body {
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        padding: 20px;
      }
      .chat-container {
        width: 100%;
        max-width: 600px;
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      #display-area {
        height: 400px;
        border: 1px solid #eee;
        border-radius: 10px;
        overflow-y: auto;
        padding: 15px;
        background: #fafafa;
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .msg-item {
        padding: 8px 12px;
        border-radius: 10px;
        max-width: 85%;
        line-height: 1.4;
        position: relative;
      }
      .msg-global {
        background: #e9ecef;
        align-self: flex-start;
        border-left: 4px solid var(--gray);
      }
      .msg-room {
        background: #d1e7ff;
        align-self: flex-start;
        border-left: 4px solid var(--primary);
      }
      .msg-system {
        font-style: italic;
        color: #888;
        text-align: center;
        align-self: center;
        font-size: 13px;
        background: none;
      }

      .tag {
        font-size: 10px;
        font-weight: bold;
        text-transform: uppercase;
        margin-bottom: 2px;
        display: block;
      }
      .tag-room {
        color: var(--primary);
      }
      .tag-global {
        color: var(--gray);
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .row {
        display: flex;
        gap: 10px;
      }
      input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        outline: none;
      }
      button {
        padding: 10px 15px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        color: white;
        font-weight: bold;
        transition: 0.2s;
      }

      .btn-join {
        background: var(--primary);
      }
      .btn-leave {
        background: var(--danger);
      }
      .btn-send {
        background: var(--success);
        flex: 0.3;
      }
      button:hover {
        opacity: 0.9;
      }
      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <h3 style="margin-top: 0; text-align: center; color: #333">
        🚀 Socket.io Room Test
      </h3>

      <div id="display-area">
        <div class="msg-item msg-system">
          Chào mừng bro! Hãy vào phòng để bắt đầu chat riêng.
        </div>
      </div>

      <div class="controls">
        <div class="row">
          <input
            type="text"
            id="roomInput"
            placeholder="Nhập tên phòng (vd: phong-nodejs)..."
          />
          <button class="btn-join" onclick="joinRoom()">Vào phòng</button>
          <button
            class="btn-leave"
            id="leaveBtn"
            onclick="leaveRoom()"
            disabled
          >
            Thoát
          </button>
        </div>

        <div class="row">
          <input
            type="text"
            id="nameInput"
            placeholder="Tên của bạn..."
            value="User_123"
            style="flex: 0.4"
          />
          <input
            type="text"
            id="msgInput"
            placeholder="Nhập tin nhắn..."
            onkeypress="handleKeyPress(event)"
          />
          <button class="btn-send" onclick="handleSend()">Gửi</button>
        </div>
      </div>
    </div>

    <script>
      // 1. Kết nối đến Server
      const socket = io('http://localhost:5000', {
        transports: ['websocket', 'polling'],
      });

      let currentRoom = '';
      const displayArea = document.getElementById('display-area');
      const leaveBtn = document.getElementById('leaveBtn');

      // 2. Logic Vào phòng
      function joinRoom() {
        const roomName = document.getElementById('roomInput').value.trim();
        if (!roomName) return alert('Bro chưa nhập tên phòng kìa!');

        // Nếu đang ở phòng khác thì thoát ra trước
        if (currentRoom) {
          socket.emit('leave-room', currentRoom);
        }

        currentRoom = roomName;
        socket.emit('join-room', roomName);

        addSystemMsg(`Bạn đã tham gia phòng: ${roomName}`);
        leaveBtn.disabled = false;
      }

      // 3. Logic Thoát phòng
      function leaveRoom() {
        if (currentRoom) {
          socket.emit('leave-room', currentRoom);
          addSystemMsg(`Bạn đã rời khỏi phòng: ${currentRoom}`);
          currentRoom = '';
          document.getElementById('roomInput').value = '';
          leaveBtn.disabled = true;
        }
      }

      // 4. Logic Gửi tin nhắn
      function handleSend() {
        const name = document.getElementById('nameInput').value || 'Anonymous';
        const msg = document.getElementById('msgInput').value.trim();

        if (!msg) return;

        if (currentRoom) {
          // Gửi vào phòng hiện tại
          socket.emit('send-to-room', {
            room: currentRoom,
            sender: name,
            message: msg,
          });
        } else {
          // Gửi toàn cầu (Global)
          socket.emit('chat message', { name, msg });
        }
        document.getElementById('msgInput').value = '';
      }

      // 5. Lắng nghe các sự kiện từ Server
      socket.on('chat message', (data) => {
        addMessage(data.name, data.msg, 'global');
      });

      socket.on('room-message', (data) => {
        addMessage(data.sender, data.message, 'room');
      });

      // Helper: Thêm tin nhắn vào màn hình
      function addMessage(user, text, type) {
        const div = document.createElement('div');
        div.className = `msg-item ${type === 'room' ? 'msg-room' : 'msg-global'}`;

        const tagText = type === 'room' ? `ROOM: ${currentRoom}` : 'GLOBAL';
        const tagClass = type === 'room' ? 'tag-room' : 'tag-global';

        div.innerHTML = `
            <span class="tag ${tagClass}">${tagText}</span>
            <strong>${user}:</strong> ${text}
        `;
        displayArea.appendChild(div);
        displayArea.scrollTop = displayArea.scrollHeight;
      }

      function addSystemMsg(text) {
        const div = document.createElement('div');
        div.className = 'msg-item msg-system';
        div.innerText = `--- ${text} ---`;
        displayArea.appendChild(div);
        displayArea.scrollTop = displayArea.scrollHeight;
      }

      function handleKeyPress(e) {
        if (e.key === 'Enter') handleSend();
      }
    </script>
  </body>
</html>
